<!DOCTYPE html>
<html>
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no, width=device-width">
        <title>Ecuaciones</title>
		<link rel = "stylesheet" href = "css/styles.css">
		<script type="text/javascript" src="http://latex.codecogs.com/latexit.js"></script>
    </head>
    <body>
		<div id = "divTitle1">
			<h2 id = "title1">CINETICA QUIMICA</h2>
		</div>
		<div id = "type">
		<center>
			<h3 id = "title1">PRIMER ORDEN</h3>
				<table  class = "formulaTable">
					<tr class = "formulaColumnTable">
						<td class = "formulaImageCell"><a href = "ecuacion.html?type=QUIN&ecu=QUIN1"><button  id = "buttonType" class = "formulaImage" lang="latex">\ln{\frac{[A]_{o}}{[A]_{f}}} = kt</button></a></td>
						<td class = "formulaImageCell"><a href = "ecuacion.html?type=QUIN&ecu=QUIN2"><button  id = "buttonType" class = "formulaImage" lang="latex">t_{1/2} = \frac{0.693}{k}</button></a></td>
					</tr>
				</table>
			<h3 id = "title1">SEGUNDO ORDEN</h3>
				<table  class = "formulaTable">
					<tr class = "formulaColumnTable">
						<td class = "formulaImageCell"><a href = "ecuacion.html?type=QUIN&ecu=QUIN3"><button  id = "buttonType" class = "formulaImage" lang="latex">t_{1/2} = \frac{1}{k[A]_{0}}</button></a></td>
						<td class = "formulaImageCell"><a href = "ecuacion.html?type=QUIN&ecu=QUIN4"><button  id = "buttonType" class = "formulaImage" lang="latex">\frac{1}{[A]} - \frac{1}{[A]_{0}} = kt</button></a></td>
					</tr>
				</table>
			<h3 id = "title1">ORDEN CERO</h3>
				<table  class = "formulaTable">
					<tr class = "formulaColumnTable">
						<td class = "formulaImageCell"><a href = "ecuacion.html?type=QUIN&ecu=QUIN5"><button  id = "buttonType" class = "formulaImage" lang="latex">t_{1/2} = \frac{[A]_{0}}{2k}</button></a></td>
						<td class = "formulaImageCell"><a href = "ecuacion.html?type=QUIN&ecu=QUIN6"><button  id = "buttonType" class = "formulaImage" lang="latex">[A]_{0} - [A] = kt</button></a></td>
					</tr>
				</table>
			</div>
		</center>
    </body>
</html>
