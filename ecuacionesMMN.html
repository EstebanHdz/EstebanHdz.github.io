    <body>
		<div id = "divTitle1">
			<h2 id = "title1">MOLALIDAD, MOLARIDAD Y NORMALIDAD</h2>

		<div id = "type">
		</br>
			<center>
				<h3 id = "title1">MOLALIDAD</h3>
					<table  class = "formulaTable">
						<tr class = "formulaColumnTable">
							<td class = "formulaImageCell"><a href = "ecuacion.html?type=MMN&ecu=MMN1"><button  id = "buttonType" class = "formulaImage" lang="latex">m = \frac{n}{Kg_{solvent}}</button></a></td>
							<td class = "formulaImageCell"><a href = "ecuacion.html?type=MMN&ecu=MMN2"><button  id = "buttonType" class = "formulaImage" lang="latex">w = \frac{w_{solute}}{w_{solvent} + w_{solute}} * 100</button></a></td>

							<td class = "formulaImageCell"><a href = "ecuacion.html?type=MMN&ecu=MMN3"><button  id = "buttonType" class = "formulaImage" lang = "latex">ppm = \frac{w_{solute}}{w_{solvent} + w_{solute}} * 1x10^{6}</button></a></td>

				<h3 id = "title1">MOLARIDAD</h3>
					<table  class = "formulaTable">
						<tr class = "formulaColumnTable">
							<td class = "formulaImageCell"><a href = "ecuacion.html?type=MMN&ecu=MMN4"><button  id = "buttonType" class = "formulaImage" lang="latex">M_{1}V_{1} = M_{2}V_{2}</button></a></td>

							<td class = "formulaImageCell"><a href = "ecuacion.html?type=MMN&ecu=MMN6"><button  id = "buttonType" class = "formulaImage" lang = "latex">n = \frac{w}{MW}</button></a></td>                                    
					</table>
					
					<h3 id = "title1">NORMALIDAD</h3>
					<table  class = "formulaTable">
						<tr class = "formulaColumnTable">
							<td class = "formulaImageCell"><a href = "ecuacion.html?type=MMN&ecu=MMN7"><button  id = "buttonType" class = "formulaImage" lang="latex">N = \frac{w (charge+)}{MW V}</button></a></td>
						</tr>
